<html lang="en">
<head>
<meta charset="UTF-8">

<title>COW ULTRA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Boogaloo&family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }

  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Boogaloo', cursive;
    touch-action: none;
  }

  #gameWrapper {
    position: relative;
    width: 400px;
    height: 700px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: #000;
    border: 3px solid #5a3e1b;
    box-shadow: 0 0 40px rgba(255,180,0,0.3);
    touch-action: none;
  }

  #gameCanvas {
    flex: 1;
    display: block;
    width: 100%;
  }

  /* HUD */
  #hud {
    background: linear-gradient(180deg, #1a0d00 0%, #2a1500 100%);
    border-top: 3px solid #8b5e1a;
    border-bottom: 2px solid #5a3e1b;
    padding: 6px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    min-height: 44px;
  }
  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .hud-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    color: #8b6a2a;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }
  .hud-value {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #ffe066;
    text-shadow: 0 0 8px #ffaa00;
  }
  #livesDisplay { display: flex; gap: 3px; }
  .life-icon { font-size: 14px; }
  #powerupDisplay {
    font-size: 10px;
    color: #66ffcc;
    font-family: 'Press Start 2P', monospace;
    text-shadow: 0 0 6px #00ffaa;
    min-width: 60px;
    text-align: center;
  }

  /* CONTROLS */
  #controls {
    background: linear-gradient(0deg, #1a0a00 0%, #2d1500 100%);
    border-top: 3px solid #8b5e1a;
    height: 178px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    position: relative;
  }

  /* D-PAD */
  #dpad {
    position: relative;
    width: 138px;
    height: 138px;
    flex-shrink: 0;
    /* invisible touch overlay handles all dpad input */
  }
  .dpad-btn {
    position: absolute;
    background: repeating-linear-gradient(
      45deg,
      #5a3a1a,
      #5a3a1a 4px,
      #7a5228 4px,
      #7a5228 8px
    );
    border: 2px solid #3a2010;
    box-shadow: inset 0 1px 0 rgba(255,200,100,0.2), 0 3px 6px rgba(0,0,0,0.6);
    cursor: pointer;
    transition: filter 0.05s;
    user-select: none;
    -webkit-user-select: none;
    pointer-events: none; /* handled by overlay */
  }
  .dpad-btn.pressed {
    filter: brightness(1.5);
  }
  /* arm size = 46px, center = 46px */
  #dUp    { top: 0;    left: 46px; width: 46px; height: 46px; border-radius: 6px 6px 0 0; }
  #dDown  { bottom: 0; left: 46px; width: 46px; height: 46px; border-radius: 0 0 6px 6px; }
  #dLeft  { top: 46px; left: 0;    width: 46px; height: 46px; border-radius: 6px 0 0 6px; }
  #dRight { top: 46px; right: 0;   width: 46px; height: 46px; border-radius: 0 6px 6px 0; }
  #dCenter {
    position: absolute;
    top: 46px; left: 46px;
    width: 46px; height: 46px;
    background: repeating-linear-gradient(
      45deg, #5a3a1a, #5a3a1a 4px, #7a5228 4px, #7a5228 8px
    );
    border: 2px solid #3a2010;
    pointer-events: none;
  }
  /* transparent touch overlay that covers whole dpad for slide */
  #dpadOverlay {
    position: absolute;
    top: 0; left: 0;
    width: 138px; height: 138px;
    z-index: 10;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* ACTION BUTTONS — absolutely positioned in a diagonal line */
  #actionBtns {
    position: relative;
    width: 148px;
    height: 148px;
    flex-shrink: 0;
  }
  .action-btn {
    position: absolute;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: 3px solid #6b1a1a;
    background: radial-gradient(circle at 35% 30%, #e84040, #8b1a1a 70%);
    box-shadow:
      0 5px 0 #5a0f0f,
      0 7px 14px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,100,100,0.3);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.05s, box-shadow 0.05s;
    /* label drawn via ::after pseudo — no selectable text */
    color: transparent;
    font-size: 0;
  }
  /* letter labels via pseudo so no copy/paste */
  #btnC::after { content: 'C'; }
  #btnB::after { content: 'B'; }
  #btnA::after { content: 'A'; }
  .action-btn::after {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    pointer-events: none;
    user-select: none;
  }
  /* diagonal: C top-left, B mid, A bottom-right */
  #btnC { top: 4px;  left: 4px;  }
  #btnB { top: 47px; left: 47px; }
  #btnA { top: 90px; left: 90px; }

  .action-btn.pressed {
    transform: translateY(4px);
    box-shadow: 0 1px 0 #5a0f0f, 0 2px 6px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,100,100,0.3);
    filter: brightness(1.3);
  }
  /* transparent overlay for action slide */
  #actionOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 10;
    -webkit-tap-highlight-color: transparent;
  }

  /* overlay screens */
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #overlay h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 22px;
    color: #ffe066;
    text-shadow: 0 0 20px #ff8800, 3px 3px 0 #5a3e1b;
    margin-bottom: 10px;
    text-align: center;
    line-height: 1.4;
  }
  #overlay p {
    font-family: 'Boogaloo', cursive;
    font-size: 18px;
    color: #ccc;
    margin-bottom: 6px;
    text-align: center;
  }
  #startBtn {
    margin-top: 20px;
    padding: 14px 30px;
    background: radial-gradient(circle, #e84040, #8b1a1a);
    border: 3px solid #ff6666;
    border-radius: 8px;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    cursor: pointer;
    box-shadow: 0 4px 0 #5a0f0f, 0 6px 20px rgba(200,0,0,0.5);
    letter-spacing: 1px;
  }
  #startBtn:hover { filter: brightness(1.2); }
</style>

function initFirebase() {
  if (!firebase.apps.length) {

    console.log("🐄 Firebase connected to COW ULTRA");

  db = firebase.database();

async function submitHighScore(name, score) {
  if (!db || !name || score < 100) return;
  const leaderboardRef = db.ref('leaderboard');
  const newScoreRef = leaderboardRef.push();
  await newScoreRef.set({
    name: name.trim().substring(0, 12),
    score: score,
    timestamp: firebase.database.ServerValue.TIMESTAMP
  });
  console.log('🏆 Score submitted: ' + score + ' by ' + name);
}

async function getTopScores() {
  if (!db) return [];
  return new Promise((resolve) => {
    const leaderboardRef = db.ref('leaderboard');
    leaderboardRef.orderByChild('score').limitToLast(10).once('value', (snapshot) => {
      const scores = [];
      snapshot.forEach((child) => { scores.unshift(child.val()); });
      resolve(scores);
    });
  });
}

// ─── STATE ───────────────────────────────────────────────────────────────────

// ─── ENEMY DEFS ──────────────────────────────────────────────────────────────

// ─── INPUT ───────────────────────────────────────────────────────────────────
const keys = { up:false, down:false, left:false, right:false, a:false, b:false, c:false };
const prevKeys = {};

// ── D-PAD: slide-aware touch overlay
(function() {
  const overlay = document.getElementById('dpadOverlay');
  const SIZE = 138; // overlay dimensions
  const ARM  = 46;  // arm width

  function getDirFromXY(x, y) {
    // x,y relative to overlay top-left
    const cx = SIZE/2, cy = SIZE/2;
    const dx = x - cx, dy = y - cy;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if (adx < ARM/2 && ady < ARM/2) return null; // dead center
    if (adx > ady) return dx > 0 ? 'right' : 'left';
    return dy > 0 ? 'down' : 'up';
  }

  function clearDpad() {
    keys.up = keys.down = keys.left = keys.right = false;
    ['dUp','dDown','dLeft','dRight'].forEach(id => document.getElementById(id).classList.remove('pressed'));
  }

  function applyDir(dir) {
    clearDpad();
    if (!dir) return;
    const map = { up:'dUp', down:'dDown', left:'dLeft', right:'dRight' };
    keys[dir] = true;
    document.getElementById(map[dir]).classList.add('pressed');
  }

  function getRelXY(e, touch) {
    const rect = overlay.getBoundingClientRect();
    const src = touch || e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  }

  overlay.addEventListener('pointerdown', e => {
    e.preventDefault();
    overlay.setPointerCapture(e.pointerId);
    const {x,y} = getRelXY(e);
    applyDir(getDirFromXY(x, y));
  }, { passive: false });

  overlay.addEventListener('pointermove', e => {
    e.preventDefault();
    if (e.buttons === 0) return;
    const {x,y} = getRelXY(e);
    applyDir(getDirFromXY(x, y));
  }, { passive: false });

  overlay.addEventListener('pointerup',     e => { e.preventDefault(); clearDpad(); }, { passive:false });
  overlay.addEventListener('pointercancel', e => { e.preventDefault(); clearDpad(); }, { passive:false });
})();

// ── ACTION BUTTONS: slide-aware touch overlay
(function() {
  const overlay = document.getElementById('actionOverlay');
  const BTN_SIZE = 54;

  // Button centers within #actionBtns (148x148 container)
  const BTNS = [
    { id: 'btnC', key: 'c', cx: 4  + BTN_SIZE/2, cy: 4  + BTN_SIZE/2 },
    { id: 'btnB', key: 'b', cx: 47 + BTN_SIZE/2, cy: 47 + BTN_SIZE/2 },
    { id: 'btnA', key: 'a', cx: 90 + BTN_SIZE/2, cy: 90 + BTN_SIZE/2 },
  ];
  const RADIUS = BTN_SIZE / 2 + 4;

  const activeKeys = new Set();

  function getBtnAt(x, y) {
    let best = null, bestD = Infinity;
    for (const b of BTNS) {
      const d = Math.sqrt((x-b.cx)**2 + (y-b.cy)**2);
      if (d < RADIUS && d < bestD) { bestD = d; best = b; }
    }
    return best;
  }

  function pressBtn(btn) {
    if (!btn || activeKeys.has(btn.key)) return;
    activeKeys.add(btn.key);
    keys[btn.key] = true;
    document.getElementById(btn.id).classList.add('pressed');
  }

  function releaseBtn(btn) {
    if (!btn) return;
    activeKeys.delete(btn.key);
    keys[btn.key] = false;
    document.getElementById(btn.id).classList.remove('pressed');
  }

  function releaseAll() {
    BTNS.forEach(b => { activeKeys.delete(b.key); keys[b.key]=false; document.getElementById(b.id).classList.remove('pressed'); });
  }

  const pointerBtns = new Map(); // pointerId -> btn

  function getRelXY(e) {
    const rect = overlay.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  overlay.addEventListener('pointerdown', e => {
    e.preventDefault();
    overlay.setPointerCapture(e.pointerId);
    const {x,y} = getRelXY(e);
    const btn = getBtnAt(x,y);
    pointerBtns.set(e.pointerId, btn);
    pressBtn(btn);
  }, { passive:false });

  overlay.addEventListener('pointermove', e => {
    e.preventDefault();
    if (e.buttons === 0) return;
    const {x,y} = getRelXY(e);
    const newBtn = getBtnAt(x,y);
    const oldBtn = pointerBtns.get(e.pointerId);
    if (newBtn !== oldBtn) {
      releaseBtn(oldBtn);
      pointerBtns.set(e.pointerId, newBtn);
      pressBtn(newBtn);
    }
  }, { passive:false });

  overlay.addEventListener('pointerup', e => {
    e.preventDefault();
    releaseBtn(pointerBtns.get(e.pointerId));
    pointerBtns.delete(e.pointerId);
  }, { passive:false });

  overlay.addEventListener('pointercancel', e => {
    e.preventDefault();
    releaseBtn(pointerBtns.get(e.pointerId));
    pointerBtns.delete(e.pointerId);
    if (pointerBtns.size === 0) releaseAll();
  }, { passive:false });
})();

document.addEventListener('keydown', e => {
  if (e.key==='ArrowUp'||e.key==='w') keys.up=true;
  if (e.key==='ArrowDown'||e.key==='s') keys.down=true;
  if (e.key==='ArrowLeft'||e.key==='a') keys.left=true;
  if (e.key==='ArrowRight'||e.key==='d') keys.right=true;
  if (e.key==='z'||e.key==='Enter') keys.a=true;
  if (e.key==='x'||e.key==='Shift') keys.b=true;
  if (e.key==='c'||e.key==='Control') keys.c=true;
});
document.addEventListener('keyup', e => {
  if (e.key==='ArrowUp'||e.key==='w') keys.up=false;
  if (e.key==='ArrowDown'||e.key==='s') keys.down=false;
  if (e.key==='ArrowLeft'||e.key==='a') keys.left=false;
  if (e.key==='ArrowRight'||e.key==='d') keys.right=false;
  if (e.key==='z'||e.key==='Enter') keys.a=false;
  if (e.key==='x'||e.key==='Shift') keys.b=false;
  if (e.key==='c'||e.key==='Control') keys.c=false;
});

function justPressed(k) { return keys[k] && !prevKeys[k]; }

// ─── INIT ────────────────────────────────────────────────────────────────────
function startGame() {
  document.getElementById('overlay').style.display = 'none';
  cow = { x: 200, y: 350, w: 30, h: 24, vx: 0, vy: 0 };
  projectiles = [];
  enemies = [];
  drops = [];
  particles = [];
  passives = [];
  terrainTiles = initTerrain();
  Object.assign(state, {
    running:true, score:0, lives:3, combo:1, comboTimer:0,
    speed:1.5, speedTimer:0,
    terrain:'grass', terrainTimer:3000,
    powerup:null, powerupTimer:0,
    flashMsg:null, flashTimer:0,
    invincible:0, chargeTimer:0, chargeCooldown:0, dashCooldown:0,
  });
  updateHUD();
  requestAnimationFrame(loop);
}

function initTerrain() {
  const tiles = [];
  const T = TERRAINS[state.terrain];
  for (let y = -50; y < canvas.height + 50; y += 50) {
    for (let x = 0; x < 400; x += 50) {
      tiles.push({ x, y, color: Math.random() > 0.5 ? T.bg : T.accent, size: 50 });
    }
  }
  return tiles;
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let last = 0;
let milkTimer = 0;
let enemySpawnTimer = 0;
let dropSpawnTimer = 0;
let passiveTimer = 0;

function loop(ts) {
  if (!state.running) return;
  const dt = Math.min(ts - last, 50);
  last = ts;
  update(dt);
  render();
  Object.assign(prevKeys, keys);
  requestAnimationFrame(loop);
}

function update(dt) {
  const sp = state.speed;

  // ── Speed escalation
  state.speedTimer += dt;
  if (state.speedTimer > 8000) {
    state.speedTimer = 0;
    state.speed = Math.min(state.speed + 0.08, 6);
  }

  // ── Terrain scrolling
  state.terrainTimer -= dt;
  if (state.terrainTimer <= 0) {
    const idx = (TERRAIN_ORDER.indexOf(state.terrain) + 1) % TERRAIN_ORDER.length;
    state.terrain = TERRAIN_ORDER[idx];
    const T = TERRAINS[state.terrain];
    terrainTiles.forEach(t => { t.color = Math.random()>0.5 ? T.bg : T.accent; });
    state.terrainTimer = 12000 + Math.random()*8000;
    showFlash(TERRAINS[state.terrain].name);
  }
  terrainTiles.forEach(t => {
    t.y += sp * (dt/16);
    if (t.y > canvas.height + 50) {
      t.y -= canvas.height + 100;
      const T = TERRAINS[state.terrain];
      t.color = Math.random()>0.5 ? T.bg : T.accent;
    }
  });

  // ── Cow movement
  let mx = 0, my = 0;
  const isCharging = state.chargeTimer > 0;
  const speed = isCharging ? 8 : 3.5;

  if (keys.up)    my = -1;
  if (keys.down)  my =  1;
  if (keys.left)  mx = -1;
  if (keys.right) mx =  1;

  // Normalize diagonal
  if (mx && my) { mx *= 0.707; my *= 0.707; }

  cow.x += mx * speed;
  cow.y += my * speed;
  cow.x = Math.max(15, Math.min(385, cow.x));
  cow.y = Math.max(15, Math.min(canvas.height - 15, cow.y));

  // Charge (A)
  if (state.chargeCooldown > 0) state.chargeCooldown -= dt;
  if (state.chargeTimer > 0) state.chargeTimer -= dt;
  if (justPressed('a') && state.chargeCooldown <= 0) {
    state.chargeTimer = 600;
    state.chargeCooldown = 2500;
    spawnParticle(cow.x, cow.y, '#ffaa00', 16);
  }

  // Dash (B + direction)
  if (state.dashCooldown > 0) state.dashCooldown -= dt;
  if (justPressed('b') && state.dashCooldown <= 0 && (keys.left || keys.right)) {
    const dir = keys.left ? -1 : 1;
    cow.x += dir * 80;
    cow.x = Math.max(15, Math.min(385, cow.x));
    state.dashCooldown = 1200;
    for (let i=0; i<6; i++) spawnParticle(cow.x, cow.y, '#aaccff', 10);
  }

  // ── Milk / powerup firing
  milkTimer -= dt;
  const fireRate = state.powerup === 'machinegun' ? 120 : state.powerup === 'supersoaker' ? 180 : 350;
  if (keys.c && milkTimer <= 0) {
    milkTimer = fireRate;
    fireWeapon();
  }

  // ── Powerup timer
  if (state.powerup && state.powerupTimer > 0) {
    state.powerupTimer -= dt;
    if (state.powerupTimer <= 0) {
      state.powerup = null;
      updateHUD();
    }
  }

  // ── Combo decay
  state.comboTimer -= dt;
  if (state.comboTimer <= 0 && state.combo > 1) {
    state.combo = 1;
    updateHUD();
  }

  // ── Flash msg
  if (state.flashTimer > 0) state.flashTimer -= dt;

  // ── Invincibility frames
  if (state.invincible > 0) state.invincible -= dt;

  // ── Enemy spawn
  enemySpawnTimer -= dt;
  if (enemySpawnTimer <= 0) {
    spawnEnemy();
    enemySpawnTimer = Math.max(300, 1800 - state.score / 20);
  }

  // ── Drop spawn
  dropSpawnTimer -= dt;
  if (dropSpawnTimer <= 0) {
    if (Math.random() < 0.5) spawnDrop();
    dropSpawnTimer = 4000 + Math.random()*4000;
  }

  // ── Passive hazard spawn
  passiveTimer -= dt;
  if (passiveTimer <= 0) {
    if (Math.random() < 0.3) spawnPassive();
    passiveTimer = 5000 + Math.random()*8000;
  }

  // ── Update enemies
  enemies.forEach(e => {
    if (e.stunTimer > 0) { e.stunTimer -= dt; return; }
    const dx = cow.x - e.x, dy = cow.y - e.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    e.x += (dx/dist) * e.type.speed * sp * (dt/16);
    e.y += (dy/dist) * e.type.speed * sp * (dt/16);
    e.y += sp * 0.3 * (dt/16); // scroll with terrain

    // Ranged enemies shoot
    if (e.type.ranged) {
      e.fireTimer = (e.fireTimer||0) - dt;
      if (e.fireTimer <= 0) {
        e.fireTimer = 1500 + Math.random()*1000;
        projectiles.push({ x: e.x, y: e.y, vx: (dx/dist)*3, vy: (dy/dist)*3, r: 5, color: '#ff4444', enemy: true });
      }
    }

    // Scroll off screen
    if (e.y > canvas.height + 60) e.dead = true;

    // Hit cow
    if (!e.dead && state.invincible <= 0 && dist < 22 + (e.type.size/2)) {
      e.dead = true;
      takeDamage();
    }
  });

  // ── Update projectiles
  projectiles.forEach(p => {
    p.x += p.vx * (dt/16) * (p.enemy ? 1 : sp);
    p.y += p.vy * (dt/16) * (p.enemy ? 1 : sp*0.5) + (p.enemy ? 0 : sp * 0.5 * (dt/16));

    if (p.x < 0 || p.x > 400 || p.y < 0 || p.y > canvas.height) { p.dead = true; return; }

    if (!p.enemy) {
      enemies.forEach(e => {
        if (e.dead) return;
        const dx = p.x - e.x, dy = p.y - e.y;
        if (Math.sqrt(dx*dx+dy*dy) < e.type.size/2 + p.r) {
          e.hp--;
          spawnParticle(p.x, p.y, p.color, 5);
          p.dead = state.powerup !== 'supersoaker'; // supersoaker pierces
          if (e.hp <= 0) {
            e.dead = true;
            addScore(e.type.score);
            spawnParticle(e.x, e.y, e.type.color, 12);
          }
        }
      });
    } else {
      const dx = p.x - cow.x, dy = p.y - cow.y;
      if (state.invincible <= 0 && Math.sqrt(dx*dx+dy*dy) < 18) {
        p.dead = true;
        takeDamage();
      }
    }
  });

  // ── Passive hazards
  passives.forEach(ph => {
    ph.y += sp * (dt/16);
    ph.timer -= dt;
    if (ph.timer <= 0 || ph.y > canvas.height + 60) { ph.dead = true; return; }
    const dx = ph.x - cow.x, dy = ph.y - cow.y;
    if (state.invincible <= 0 && Math.sqrt(dx*dx+dy*dy) < ph.type.size + 14) {
      ph.dead = true;
      takeDamage();
      showFlash(ph.type.label);
    }
  });

  // ── Drops
  drops.forEach(d => {
    d.y += sp * 0.8 * (dt/16);
    if (d.y > canvas.height + 40) { d.dead = true; return; }
    const dx = d.x - cow.x, dy = d.y - cow.y;
    if (Math.sqrt(dx*dx+dy*dy) < 20) {
      d.dead = true;
      state.powerup = d.ptype.id;
      state.powerupTimer = d.ptype.duration;
      showFlash(d.ptype.label);
      updateHUD();
    }
  });

  // ── Particles
  particles.forEach(p => {
    p.x += p.vx * (dt/16);
    p.y += p.vy * (dt/16);
    p.life -= dt;
    p.alpha = Math.max(0, p.life / p.maxLife);
    if (p.life <= 0) p.dead = true;
  });

  // ── Cull dead
  enemies    = enemies.filter(e => !e.dead);
  projectiles= projectiles.filter(p => !p.dead);
  drops      = drops.filter(d => !d.dead);
  particles  = particles.filter(p => !p.dead);
  passives   = passives.filter(p => !p.dead);

  // ── Score scroll bonus
  state.score += Math.floor(sp * dt / 800);
  updateHUD();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Terrain
  terrainTiles.forEach(t => {
    ctx.fillStyle = t.color;
    ctx.fillRect(t.x, t.y, t.size+1, t.size+1);
  });
  drawTerrainAccents();

  // Passives
  passives.forEach(ph => drawPassive(ph));

  // Drops
  drops.forEach(d => drawDrop(d));

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Projectiles
  projectiles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 8;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Enemies
  enemies.forEach(e => drawEnemy(e));

  // Cow
  drawCow();

  // Flash message
  if (state.flashTimer > 0) {
    const alpha = Math.min(1, state.flashTimer / 600);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffff66';
    ctx.font = 'bold 22px Boogaloo, cursive';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ff8800';
    ctx.fillText(state.flashMsg, canvas.width/2, 60);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Charge indicator
  if (state.chargeCooldown > 0) {
    const pct = 1 - state.chargeCooldown/2500;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(10, canvas.height-20, 60, 8);
    ctx.fillStyle = '#ffaa00';
    ctx.fillRect(10, canvas.height-20, 60*pct, 8);
  }
}

function drawTerrainAccents() {
  const T = TERRAINS[state.terrain];
  // small random accent details per terrain
  if (state.terrain === 'grass' || state.terrain === 'longgrass') {
    // drawn as part of terrain tiles already
  }
  if (state.terrain === 'moon' || state.terrain === 'mars') {
    // craters drawn below as part of tiles
  }
}

function drawCow() {
  const { x, y } = cow;
  const blink = state.invincible > 0 && Math.floor(state.invincible/80) % 2 === 0;
  if (blink) return;

  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 10, 18, 7, 0, 0, Math.PI*2);
  ctx.fill();

  // Body
  ctx.fillStyle = state.chargeTimer > 0 ? '#ffddaa' : '#fff';
  ctx.beginPath();
  ctx.ellipse(0, 0, 15, 11, 0, 0, Math.PI*2);
  ctx.fill();

  // Spots
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.ellipse(-4, -3, 5, 4, -0.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5, 3, 4, 3, 0.3, 0, Math.PI*2); ctx.fill();

  // Head
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(0, -13, 8, 7, 0, 0, Math.PI*2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-3, -14, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, -14, 2, 0, Math.PI*2); ctx.fill();

  // Nostrils
  ctx.fillStyle = '#e0a0a0';
  ctx.beginPath(); ctx.arc(-2, -10, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2, -10, 1.5, 0, Math.PI*2); ctx.fill();

  // Horns
  ctx.strokeStyle = '#d4a820';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-5,-18); ctx.lineTo(-7,-24); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5,-18); ctx.lineTo(7,-24); ctx.stroke();

  // Legs
  ctx.fillStyle = '#fff';
  [[-9,8],[-4,9],[4,9],[9,8]].forEach(([lx,ly]) => {
    ctx.fillRect(lx-2, ly, 4, 7);
  });

  // Udder
  ctx.fillStyle = '#f0a0a0';
  ctx.beginPath();
  ctx.ellipse(0, 9, 6, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // Powerup aura
  if (state.powerup) {
    const pu = POWERUP_TYPES.find(p=>p.id===state.powerup);
    ctx.strokeStyle = pu ? pu.color : '#fff';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.5 + 0.5*Math.sin(Date.now()/200);
    ctx.beginPath();
    ctx.ellipse(0, 0, 20, 16, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  const s = e.type.size;
  const c = e.type.color;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(0, s/2+2, s/2, s/4, 0, 0, Math.PI*2);
  ctx.fill();

  // HP bar
  if (e.type.hp > 1) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(-s/2, -s/2-8, s, 4);
    ctx.fillStyle = '#44ff44';
    ctx.fillRect(-s/2, -s/2-8, s*(e.hp/e.type.hp), 4);
  }

  switch(e.type.shape) {
    case 'human': drawHuman(c, s); break;
    case 'horse': drawHorse(c, s); break;
    case 'gator': drawGator(c, s); break;
    case 'wolf':  drawWolf(c, s); break;
    default:      drawHuman(c, s);
  }

  ctx.restore();
}

function drawHuman(c, s) {
  const h = s;
  ctx.fillStyle = c;
  ctx.beginPath(); ctx.arc(0, -h/2, h/4, 0, Math.PI*2); ctx.fill(); // head
  ctx.fillRect(-h/5, -h/3, h/2.5, h/2); // body
  ctx.fillRect(-h/3, -h/4, h/5, h/2.5); // arm L
  ctx.fillRect(h/7,  -h/4, h/5, h/2.5); // arm R
  ctx.fillRect(-h/5, h/6,  h/5, h/2.5); // leg L
  ctx.fillRect(h/14, h/6,  h/5, h/2.5); // leg R
}

function drawHorse(c, s) {
  ctx.fillStyle = c;
  ctx.beginPath(); ctx.ellipse(0, 0, s/2, s/3, 0, 0, Math.PI*2); ctx.fill(); // body
  ctx.beginPath(); ctx.ellipse(s/3, -s/4, s/4, s/5, 0.5, 0, Math.PI*2); ctx.fill(); // head
  ctx.fillStyle = '#ccc';
  ctx.beginPath(); ctx.ellipse(0,-s/2+4, 4, s/4, 0.1, 0, Math.PI*2); ctx.fill(); // mane
  // legs
  ctx.fillStyle = c;
  [[-s/3,s/4],[-s/6,s/4],[s/6,s/4],[s/3,s/4]].forEach(([lx,ly])=>{
    ctx.fillRect(lx-3, ly, 6, s/2.5);
  });
}

function drawGator(c, s) {
  ctx.fillStyle = c;
  ctx.beginPath(); ctx.ellipse(0, 0, s/2, s/4, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2a6a2a';
  ctx.beginPath();
  ctx.moveTo(-s/2, 0);
  ctx.lineTo(-s*0.8, -s/8);
  ctx.lineTo(-s/2, s/8);
  ctx.closePath();
  ctx.fill(); // tail
  ctx.fillStyle = '#dd3333';
  ctx.beginPath(); ctx.arc(s/2, 0, s/4, 0.3, Math.PI*2-0.3); ctx.fill(); // open mouth
  // dots
  ctx.fillStyle = '#1a5a1a';
  for(let i=-3;i<4;i++) { ctx.beginPath(); ctx.arc(i*5,0,2,0,Math.PI*2); ctx.fill(); }
}

function drawWolf(c, s) {
  ctx.fillStyle = c;
  ctx.beginPath(); ctx.ellipse(0, 0, s/2, s/3, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s/3, -s/4, s/4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.moveTo(s/5,-s/2+2); ctx.lineTo(s/4,-s/2-6); ctx.lineTo(s/3,-s/2+2); ctx.fill(); // ear
  ctx.fillStyle = '#f66'; ctx.beginPath(); ctx.arc(s/3+4, -s/4, 3, 0, Math.PI*2); ctx.fill(); // eye
  ctx.strokeStyle='#555'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(-s/2,-s/5); ctx.quadraticCurveTo(-s*0.7,0,-s/2,s/5); ctx.stroke();
}

function drawPassive(ph) {
  const t = ph.type;
  const pulse = 0.7 + 0.3*Math.sin(Date.now()/200);
  ctx.globalAlpha = Math.min(1, ph.timer/500) * pulse;
  ctx.fillStyle = t.color;
  ctx.shadowBlur = 20;
  ctx.shadowColor = t.color;

  if (t.id === 'wildfire') {
    for (let i=0; i<3; i++) {
      ctx.beginPath();
      ctx.arc(ph.x + i*12-12, ph.y, t.size/2+Math.sin(Date.now()/100+i)*4, 0, Math.PI*2);
      ctx.fill();
    }
  } else if (t.id === 'lightning') {
    ctx.strokeStyle = t.color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(ph.x, ph.y-30);
    ctx.lineTo(ph.x+8, ph.y);
    ctx.lineTo(ph.x-4, ph.y+10);
    ctx.lineTo(ph.x+6, ph.y+30);
    ctx.stroke();
  } else if (t.id === 'ufo') {
    ctx.beginPath(); ctx.ellipse(ph.x, ph.y, t.size, t.size/2, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#33ffaa';
    ctx.beginPath(); ctx.ellipse(ph.x, ph.y-4, t.size/2, t.size/3, 0, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath();
    ctx.arc(ph.x, ph.y, t.size, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

function drawDrop(d) {
  const pu = d.ptype;
  const pulse = 0.8 + 0.2*Math.sin(Date.now()/250);
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.scale(pulse, pulse);
  ctx.fillStyle = pu.color;
  ctx.shadowBlur = 12;
  ctx.shadowColor = pu.color;

  if (pu.shape === 'star') {
    drawStar(0, 0, 5, 12, 6);
  } else if (pu.shape === 'drop') {
    ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-5,0); ctx.lineTo(5,0); ctx.lineTo(0,-16); ctx.closePath(); ctx.fill();
  } else if (pu.shape === 'stick') {
    ctx.fillRect(-4,-14,8,24);
    ctx.fillRect(-8,-14,16,6);
  } else {
    ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
    ctx.fillRect(-2,-22,4,14);
    ctx.fillRect(-8,-22,16,6);
  }

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '7px Press Start 2P, monospace';
  ctx.textAlign = 'center';
  ctx.fillText(pu.label.split(' ')[0], 0, 24);
  ctx.restore();
}

function drawStar(cx, cy, pts, r1, r2) {
  ctx.beginPath();
  for (let i=0; i<pts*2; i++) {
    const r = i%2===0 ? r1 : r2;
    const a = (Math.PI/pts)*i - Math.PI/2;
    i===0 ? ctx.moveTo(cx+r*Math.cos(a), cy+r*Math.sin(a)) : ctx.lineTo(cx+r*Math.cos(a), cy+r*Math.sin(a));
  }
  ctx.closePath(); ctx.fill();
}

// ─── GAME ACTIONS ─────────────────────────────────────────────────────────────
function fireWeapon() {
  const pu = state.powerup;
  const baseColor = pu === 'toxic' ? '#44ff44' : pu === 'butter' ? '#ffee44' : '#ddeeff';
  const r = pu === 'supersoaker' ? 8 : pu === 'butter' ? 9 : 6;

  if (pu === 'spread') {
    for (let a=-30; a<=30; a+=15) {
      const rad = (a-90)*Math.PI/180;
      projectiles.push({ x:cow.x, y:cow.y-20, vx:Math.cos(rad)*6, vy:Math.sin(rad)*6, r:5, color:'#aa66ff', enemy:false });
    }
  } else if (pu === 'machinegun') {
    projectiles.push({ x:cow.x, y:cow.y-20, vx:(Math.random()-0.5)*1.5, vy:-8, r:4, color:'#ffaa00', enemy:false });
  } else {
    projectiles.push({ x:cow.x, y:cow.y-20, vx:0, vy:-8, r, color:baseColor, enemy:false });
  }
}

function spawnEnemy() {
  const type = ENEMY_TYPES[Math.floor(Math.random()*ENEMY_TYPES.length)];
  const x = 20 + Math.random()*360;
  enemies.push({ x, y:-30, type, hp: type.hp, stunTimer:0 });
}

function spawnDrop() {
  const ptype = POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
  drops.push({ x: 30+Math.random()*340, y:-20, ptype });
}

function spawnPassive() {
  const type = PASSIVE_TYPES[Math.floor(Math.random()*PASSIVE_TYPES.length)];
  passives.push({ x: 30+Math.random()*340, y:-30, type, timer: 3000+Math.random()*3000 });
}

function spawnParticle(x, y, color, count) {
  for (let i=0; i<count; i++) {
    const a = Math.random()*Math.PI*2;
    const sp = 1+Math.random()*4;
    particles.push({
      x, y,
      vx: Math.cos(a)*sp,
      vy: Math.sin(a)*sp,
      color,
      r: 2+Math.random()*3,
      life: 400+Math.random()*400,
      maxLife: 800,
      alpha: 1,
    });
  }
}

function addScore(pts) {
  state.combo++;
  state.comboTimer = 2500;
  state.score += pts * state.combo;
  updateHUD();
}

function takeDamage() {
  state.lives--;
  state.invincible = 1800;
  state.combo = 1;
  for (let i=0; i<12; i++) spawnParticle(cow.x, cow.y, '#ff3333', 12);
  updateHUD();
  if (state.lives <= 0) gameOver();
}

function showFlash(msg) {
  state.flashMsg = msg;
  state.flashTimer = 1800;
}

function updateHUD() {
  document.getElementById('scoreDisplay').textContent = state.score;
  document.getElementById('comboDisplay').textContent = 'x'+state.combo;
  const livesEl = document.getElementById('livesDisplay');
  livesEl.innerHTML = '🐄'.repeat(Math.max(0,state.lives)) + '💀'.repeat(Math.max(0,3-state.lives));
  const puEl = document.getElementById('powerupDisplay');
  if (state.powerup) {
    const pu = POWERUP_TYPES.find(p=>p.id===state.powerup);
    puEl.textContent = pu ? pu.label.split(' ')[0] : state.powerup.toUpperCase();
  } else {
    puEl.textContent = 'NONE';
  }
}

function gameOver() {
  state.running = false;

  // Show overlay with score + name input + leaderboard
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  ov.innerHTML = `
    <h1>MOO'D<br>OUT</h1>
    <p style="font-size:24px; color:#ffe066; margin:10px 0;">FINAL SCORE<br><span id="finalScore" style="font-size:32px;">${state.score}</span></p>
    
    <div style="margin:15px 0; width:100%; max-width:320px;">
      <input id="playerName" type="text" maxlength="12" placeholder="YOUR NAME" 
             style="width:100%; padding:12px; font-size:16px; text-align:center; background:#1a0d00; border:3px solid #8b5e1a; color:#ffe066; font-family:'Press Start 2P',monospace;">
    </div>

    <button id="submitScoreBtn" 
            style="margin-bottom:20px; padding:12px 40px; background:radial-gradient(circle,#e84040,#8b1a1a); border:3px solid #ff6666; border-radius:8px; color:#fff; font-family:'Press Start 2P',monospace; font-size:13px; cursor:pointer;">
      SUBMIT TO GLOBAL LEADERBOARD
    </button>

    <div id="leaderboardContainer" style="width:100%; max-width:340px; text-align:left; background:rgba(0,0,0,0.6); border:2px solid #8b5e1a; padding:12px; border-radius:8px; font-family:'Press Start 2P',monospace; font-size:11px; color:#ccc;">
      <div style="color:#ffaa00; text-align:center; margin-bottom:8px;">🌍 GLOBAL TOP 10 🌍</div>
      <div id="leaderboardList" style="line-height:1.6;"></div>
    </div>

    <button id="playAgainBtn" onclick="startGame()" 
            style="margin-top:20px; padding:14px 30px; background:radial-gradient(circle,#e84040,#8b1a1a); border:3px solid #ff6666; border-radius:8px; color:#fff; font-family:'Press Start 2P',monospace; font-size:13px; cursor:pointer; box-shadow:0 4px 0 #5a0f0f;">
      PLAY AGAIN
    </button>
  `;

  initFirebase();

  // Load leaderboard immediately
  loadLeaderboard();

  // Submit button handler
  document.getElementById('submitScoreBtn').addEventListener('click', async () => {
    const nameInput = document.getElementById('playerName');
    const name = nameInput.value.trim();
    
    if (name.length < 2) {
      nameInput.style.borderColor = '#ff4444';
      nameInput.placeholder = "NAME TOO SHORT!";
      return;
    }

    const btn = document.getElementById('submitScoreBtn');
    btn.textContent = "SAVING...";
    btn.disabled = true;

    await submitHighScore(name, state.score);
    
    // Refresh leaderboard after submit
    await loadLeaderboard();
    
    btn.style.display = 'none';
    nameInput.style.display = 'none';
  });
}

async function loadLeaderboard() {
  const listEl = document.getElementById('leaderboardList');
  listEl.innerHTML = '<div style="text-align:center; color:#888;">LOADING TOP COWS...</div>';
  
  const scores = await getTopScores();
  
  let html = '';
  if (scores.length === 0) {
    html = '<div style="text-align:center; color:#666;">No scores yet — be the first!</div>';
  } else {
    scores.forEach((s, i) => {
      const isYou = s.score === state.score; // simple highlight
      html += `<div style="display:flex; justify-content:space-between; ${isYou ? 'color:#ffe066; font-weight:bold;' : ''}">
                 <span>${i+1}. ${s.name}</span>
                 <span>${s.score}</span>
               </div>`;
    });
  }
  listEl.innerHTML = html;
}
</script>
</body>
</html>

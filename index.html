  body {
    background: #000;
    display: flex;

    align-items: center;

  #gameWrapper {
    position: relative;

    align-items: center;

    font-family: 'Press Start 2P', monospace;

    color: #8b6a2a;
    letter-spacing: 1px;
    margin-bottom: 2px;

    position: relative;
    width: 138px;

    flex-shrink: 0;

  .dpad-btn {
    position: absolute;
    background: repeating-linear-gradient(

    user-select: none;
    -webkit-user-select: none;
    pointer-events: none; /* handled by overlay */

  .dpad-btn.pressed {
    filter: brightness(1.5);

// ── iOS Safari zoom prevention ────────────────────────────────────────────────
// gesturestart/change/end are iOS-only events for pinch/rotate zoom
document.addEventListener('gesturestart',  e => e.preventDefault(), { passive: false });
document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
document.addEventListener('gestureend',    e => e.preventDefault(), { passive: false });
// Block double-tap zoom (iOS ignores user-scalable=no since iOS 10)
let _lastTap = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - _lastTap < 300) e.preventDefault();
  _lastTap = now;
}, { passive: false });
// Block multi-finger touchmove (pinch)
document.addEventListener('touchmove', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

let db;
function initFirebase() {
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
    console.log("🐄 Firebase connected to COW ULTRA");
  }
  db = firebase.database();

async function submitHighScore(name, score) {
  if (!db || !name) return false;
  if (score < 100) return false;
  const leaderboardRef = db.ref('leaderboard');
  const newScoreRef = leaderboardRef.push();
  await newScoreRef.set({
    name: name.trim().substring(0, 12),
    score: score,
    timestamp: firebase.database.ServerValue.TIMESTAMP
  });
  console.log('🏆 Score submitted: ' + score + ' by ' + name);
  return true;
}

async function getTopScores() {
  if (!db) return [];
  return new Promise((resolve) => {
    const leaderboardRef = db.ref('leaderboard');
    leaderboardRef.orderByChild('score').limitToLast(10).once('value', (snapshot) => {
      const scores = [];
      snapshot.forEach((child) => { scores.unshift(child.val()); });
      resolve(scores);
    });
  });
}

// ─── AUDIO ───────────────────────────────────────────────────────────────────
let audioCtx = null;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playMoo(pitch = 1, vol = 0.45) {
  if (!audioCtx) return;
  try {
    const t = audioCtx.currentTime;
    const b = 130 * pitch;

    // Triangle wave — warm, not buzzy like sawtooth
    const osc = audioCtx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(b, t);
    osc.frequency.linearRampToValueAtTime(b * 1.08, t + 0.25);
    osc.frequency.setValueAtTime(b * 1.08, t + 0.55);
    osc.frequency.linearRampToValueAtTime(b * 0.88, t + 1.0);

    // Slow vibrato — makes it feel alive
    const lfo = audioCtx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 5;
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 6 * pitch;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);

    // "oo" vowel: F1 ~300 Hz, F2 ~800 Hz — two resonant bandpass filters
    const f1 = audioCtx.createBiquadFilter();
    f1.type = 'bandpass'; f1.frequency.value = 300; f1.Q.value = 10;
    const f2 = audioCtx.createBiquadFilter();
    f2.type = 'bandpass'; f2.frequency.value = 800; f2.Q.value = 8;

    // Mix both formants
    const g1 = audioCtx.createGain(); g1.gain.value = 0.7;
    const g2 = audioCtx.createGain(); g2.gain.value = 0.45;
    const master = audioCtx.createGain();

    master.gain.setValueAtTime(0, t);
    master.gain.linearRampToValueAtTime(vol, t + 0.1);
    master.gain.setValueAtTime(vol, t + 0.6);
    master.gain.linearRampToValueAtTime(0, t + 1.1);

    osc.connect(f1); osc.connect(f2);
    f1.connect(g1);  f2.connect(g2);
    g1.connect(master); g2.connect(master);
    master.connect(audioCtx.destination);

    lfo.start(t);   lfo.stop(t + 1.15);
    osc.start(t);   osc.stop(t + 1.15);
  } catch(e) {}
}

function playMilkShot() {
  if (!audioCtx) return;
  try {
    const t  = audioCtx.currentTime;
    const sr = audioCtx.sampleRate;

    // "tha" — soft wet attack noise burst
    const noiseLen = Math.floor(sr * 0.05);
    const buf = audioCtx.createBuffer(1, noiseLen, sr);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < noiseLen; i++) d[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buf;
    const nlp = audioCtx.createBiquadFilter();
    nlp.type = 'lowpass'; nlp.frequency.value = 700;
    const gNoise = audioCtx.createGain();
    gNoise.gain.setValueAtTime(0.35, t);
    gNoise.gain.exponentialRampToValueAtTime(0.001, t + 0.05);

    // "woo-pew" — sine rises then drops sharply
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(160, t);
    osc.frequency.linearRampToValueAtTime(460, t + 0.07);    // woo: rise
    osc.frequency.exponentialRampToValueAtTime(55, t + 0.22); // pew: fall

    const gOsc = audioCtx.createGain();
    gOsc.gain.setValueAtTime(0.0, t);
    gOsc.gain.linearRampToValueAtTime(0.55, t + 0.04);
    gOsc.gain.setValueAtTime(0.55, t + 0.07);
    gOsc.gain.exponentialRampToValueAtTime(0.001, t + 0.22);

    noise.connect(nlp); nlp.connect(gNoise); gNoise.connect(audioCtx.destination);
    osc.connect(gOsc); gOsc.connect(audioCtx.destination);

    noise.start(t);
    osc.start(t); osc.stop(t + 0.24);
  } catch(e) {}
}

// ─── MUSIC ───────────────────────────────────────────────────────────────────
let musicPlaying = false;
let musicLoopId  = null;

const MBPM  = 88;
const MBEAT = 60 / MBPM; // seconds per beat

// Frequencies
const N = {
  G2:98,  C3:131, D3:147, E3:165,
  Fs3:185, G3:196, A3:220, B3:247,
  C4:262, D4:294, E4:330, Fs4:370,
  G4:392, A4:440, B4:494,
  C5:523, D5:587
};

// Melody: [freq (0=rest), beats]  — 4 bars, 4/4, key of G
// "da da da-da da  dot"
const MELODY_SEQ = [
  [N.G4,1],[N.D4,1],[N.G4,.5],[N.A4,.5],[N.B4,.75],[0,.25],     // bar 1 – G
  [N.C5,1],[N.B4,1],[N.G4,.5],[N.A4,.5],[N.G4,1],               // bar 2 – C
  [N.G4,1],[N.B4,1],[N.D4,.5],[N.G4,.5],[N.G4,.5],[0,.5],       // bar 3 – G
  [N.D5,1],[N.A4,1],[N.Fs4,.5],[N.G4,.5],[N.G4,1],              // bar 4 – D→G
];

// Bass: [freq, beats]
const BASS_SEQ = [
  [N.G2,4],[N.C3,4],[N.G2,4],[N.D3,2],[N.G2,2]
];

// Chord stabs on beat 1 of each bar — quiet arpeggiated strum
const CHORD_SEQ = [
  [0,  [N.G3, N.B3, N.D4]],   // G major
  [4,  [N.C3, N.E3, N.G3]],   // C major
  [8,  [N.G3, N.B3, N.D4]],   // G major
  [12, [N.D3, N.Fs3, N.A3]],  // D major
];

const LOOP_BEATS = 16;

function pluckNote(freq, when, dBeats, vol, isBass) {
  if (!audioCtx || !freq) return;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = isBass ? 'sine' : 'triangle';
  osc.frequency.value = freq;
  const decay = isBass
    ? Math.min(dBeats * MBEAT, 1.1)
    : Math.min(dBeats * MBEAT, 0.52);
  gain.gain.setValueAtTime(vol, when);
  gain.gain.exponentialRampToValueAtTime(vol * 0.35, when + 0.025); // initial pluck transient
  gain.gain.exponentialRampToValueAtTime(0.0001, when + decay);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(when); osc.stop(when + decay + 0.05);
}

function scheduleLoop(startAt) {
  if (!musicPlaying) return;

  let mt = 0;
  for (const [f, b] of MELODY_SEQ) {
    pluckNote(f, startAt + mt * MBEAT, b, 0.17, false);
    mt += b;
  }

  let bt = 0;
  for (const [f, b] of BASS_SEQ) {
    pluckNote(f, startAt + bt * MBEAT, b, 0.24, true);
    bt += b;
  }

  for (const [beat, freqs] of CHORD_SEQ) {
    freqs.forEach((f, i) =>
      pluckNote(f, startAt + beat * MBEAT + i * 0.022, 0.5, 0.07, false)
    );
  }

  const loopSec = LOOP_BEATS * MBEAT;
  musicLoopId = setTimeout(() => scheduleLoop(startAt + loopSec), (loopSec - 0.4) * 1000);
}

function startMusic() {
  if (musicPlaying) return;
  musicPlaying = true;
  scheduleLoop(audioCtx.currentTime + 0.2);
}

// ── D-PAD: raw touch events for minimum latency on iOS Safari
(function() {
  const overlay = document.getElementById('dpadOverlay');
  const SIZE = 138;
  const ARM  = 46;

  function getDirFromXY(x, y) {
    const cx = SIZE/2, cy = SIZE/2;
    const dx = x - cx, dy = y - cy;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    if (adx < ARM/2 && ady < ARM/2) return null;
    if (adx > ady) return dx > 0 ? 'right' : 'left';
    return dy > 0 ? 'down' : 'up';
  }

  function clearDpad() {
    keys.up = keys.down = keys.left = keys.right = false;
    ['dUp','dDown','dLeft','dRight'].forEach(id =>
      document.getElementById(id).classList.remove('pressed'));
  }

  function applyDir(dir) {
    clearDpad();
    if (!dir) return;
    const map = { up:'dUp', down:'dDown', left:'dLeft', right:'dRight' };
    keys[dir] = true;
    document.getElementById(map[dir]).classList.add('pressed');
  }

  // e.targetTouches = all fingers currently on this element — handles
  // multi-touch naturally: last touch wins, lifts update automatically.
  function applyTouches(touches) {
    if (touches.length === 0) { clearDpad(); return; }
    const rect = overlay.getBoundingClientRect();
    const t = touches[touches.length - 1];
    applyDir(getDirFromXY(t.clientX - rect.left, t.clientY - rect.top));
  }

  const opts = { passive: false };
  overlay.addEventListener('touchstart',  e => { e.preventDefault(); applyTouches(e.targetTouches); }, opts);
  overlay.addEventListener('touchmove',   e => { e.preventDefault(); applyTouches(e.targetTouches); }, opts);
  overlay.addEventListener('touchend',    e => { e.preventDefault(); applyTouches(e.targetTouches); }, opts);
  overlay.addEventListener('touchcancel', e => { e.preventDefault(); clearDpad(); }, opts);
})();

// ── ACTION BUTTONS: raw touch events (same pattern as d-pad — prevents iOS zoom)
(function() {
  const overlay = document.getElementById('actionOverlay');
  const BTN_SIZE = 54;
  const BTNS = [
    { id: 'btnC', key: 'c', cx: 4  + BTN_SIZE/2, cy: 4  + BTN_SIZE/2 },
    { id: 'btnB', key: 'b', cx: 47 + BTN_SIZE/2, cy: 47 + BTN_SIZE/2 },
    { id: 'btnA', key: 'a', cx: 90 + BTN_SIZE/2, cy: 90 + BTN_SIZE/2 },
  ];
  const RADIUS = BTN_SIZE / 2 + 4;
  const touchBtns = new Map(); // touchId -> btn

  function getBtnAt(x, y) {
    let best = null, bestD = Infinity;
    for (const b of BTNS) {
      const d = Math.sqrt((x-b.cx)**2 + (y-b.cy)**2);
      if (d < RADIUS && d < bestD) { bestD = d; best = b; }
    }
    return best;
  }

  function getRelXY(touch) {
    const rect = overlay.getBoundingClientRect();
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }

  function pressBtn(btn) {
    if (!btn || keys[btn.key]) return;
    keys[btn.key] = true;
    document.getElementById(btn.id).classList.add('pressed');
  }

  function releaseBtn(btn) {
    if (!btn) return;
    keys[btn.key] = false;
    document.getElementById(btn.id).classList.remove('pressed');
  }

  function releaseAll() {
    BTNS.forEach(b => { keys[b.key] = false; document.getElementById(b.id).classList.remove('pressed'); });
  }

  const opts = { passive: false };

  overlay.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const {x, y} = getRelXY(t);
      const btn = getBtnAt(x, y);
      touchBtns.set(t.identifier, btn);
      pressBtn(btn);
    }
  }, opts);

  overlay.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const {x, y} = getRelXY(t);
      const newBtn = getBtnAt(x, y);
      const oldBtn = touchBtns.get(t.identifier);
      if (newBtn !== oldBtn) {
        releaseBtn(oldBtn);
        touchBtns.set(t.identifier, newBtn);
        pressBtn(newBtn);
      }
    }
  }, opts);

  overlay.addEventListener('touchend', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      releaseBtn(touchBtns.get(t.identifier));
      touchBtns.delete(t.identifier);
    }
  }, opts);

  overlay.addEventListener('touchcancel', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      releaseBtn(touchBtns.get(t.identifier));
      touchBtns.delete(t.identifier);
    }
    if (touchBtns.size === 0) releaseAll();
  }, opts);
})();

});

  if (e.key==='ArrowDown'||e.key==='s') keys.down=false;
  if (e.key==='ArrowLeft'||e.key==='a') keys.left=false;
  if (e.key==='ArrowRight'||e.key==='d') keys.right=false;
  if (e.key==='z'||e.key==='Enter') keys.a=false;
  if (e.key==='x'||e.key==='Shift') keys.b=false;
  if (e.key==='c'||e.key==='Control') keys.c=false;
});

function justPressed(k) { return keys[k] && !prevKeys[k]; }

// ─── INIT ────────────────────────────────────────────────────────────────────
function startGame() {
  initAudio();
  startMusic();
  document.getElementById('overlay').style.display = 'none';
  Object.keys(keys).forEach(k => keys[k] = false);
  Object.assign(prevKeys, keys);
  milkTimer = 500;
  cow = { x: 200, y: 350, w: 30, h: 24, vx: 0, vy: 0 };
  projectiles = [];
  enemies = [];
  drops = [];
  particles = [];
  passives = [];
  terrainTiles = initTerrain();
  submittedName = null;
  Object.assign(state, {
    running:true, score:0, lives:3, combo:1, comboTimer:0,
    speed:1.5, speedTimer:0,
    terrain:'grass', terrainTimer:3000,
    powerup:null, powerupTimer:0,
    flashMsg:null, flashTimer:0,
    invincible:0, chargeTimer:0, chargeCooldown:0, dashCooldown:0,
  });
  updateHUD();
  requestAnimationFrame(loop);
}

function initTerrain() {
  const tiles = [];
  const T = TERRAINS[state.terrain];
  for (let y = -50; y < canvas.height + 50; y += 50) {
    for (let x = 0; x < 400; x += 50) {
      tiles.push({ x, y, color: Math.random() > 0.5 ? T.bg : T.accent, size: 50 });
    }
  }
  return tiles;
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let last = 0;
let milkTimer = 0;
let enemySpawnTimer = 0;
let dropSpawnTimer = 0;
let passiveTimer = 0;

function loop(ts) {
  if (!state.running) return;
  const dt = Math.min(ts - last, 50);
  last = ts;
  update(dt);
  render();
  Object.assign(prevKeys, keys);
  requestAnimationFrame(loop);
}

function update(dt) {
  const sp = state.speed;

  // ── Speed escalation
  state.speedTimer += dt;
  if (state.speedTimer > 8000) {
    state.speedTimer = 0;
    state.speed = Math.min(state.speed + 0.08, 4.5);
  }

  // ── Terrain scrolling
  state.terrainTimer -= dt;
  if (state.terrainTimer <= 0) {
    const idx = (TERRAIN_ORDER.indexOf(state.terrain) + 1) % TERRAIN_ORDER.length;
    state.terrain = TERRAIN_ORDER[idx];
    const T = TERRAINS[state.terrain];
    terrainTiles.forEach(t => { t.color = Math.random()>0.5 ? T.bg : T.accent; });
    state.terrainTimer = 12000 + Math.random()*8000;
    showFlash(TERRAINS[state.terrain].name);
  }
  terrainTiles.forEach(t => {
    t.y += sp * (dt/16);
    if (t.y > canvas.height + 50) {
      t.y -= canvas.height + 100;
      const T = TERRAINS[state.terrain];
      t.color = Math.random()>0.5 ? T.bg : T.accent;
    }
  });

  // ── Cow movement
  let mx = 0, my = 0;
  const isCharging = state.chargeTimer > 0;
  const speed = isCharging ? 8 : 3.5;

  if (keys.up)    my = -1;
  if (keys.down)  my =  1;
  if (keys.left)  mx = -1;
  if (keys.right) mx =  1;

  // Normalize diagonal
  if (mx && my) { mx *= 0.707; my *= 0.707; }

  cow.x += mx * speed;
  cow.y += my * speed;
  cow.x = Math.max(15, Math.min(385, cow.x));
  cow.y = Math.max(15, Math.min(canvas.height - 15, cow.y));

  // Charge (A)
  if (state.chargeCooldown > 0) state.chargeCooldown -= dt;
  if (state.chargeTimer > 0) state.chargeTimer -= dt;
  if (justPressed('a') && state.chargeCooldown <= 0) {
    state.chargeTimer = 600;
    state.chargeCooldown = 2500;
    spawnParticle(cow.x, cow.y, '#ffaa00', 16);
    playMoo(1.6, 0.5);
  }

  // Dash (B + direction)
  if (state.dashCooldown > 0) state.dashCooldown -= dt;
  if (justPressed('b') && state.dashCooldown <= 0 && (keys.left || keys.right)) {
    const dir = keys.left ? -1 : 1;
    cow.x += dir * 80;
    cow.x = Math.max(15, Math.min(385, cow.x));
    state.dashCooldown = 1200;
    for (let i=0; i<6; i++) spawnParticle(cow.x, cow.y, '#aaccff', 10);
  }

  // ── Milk / powerup firing
  milkTimer -= dt;
  const fireRate = state.powerup === 'machinegun' ? 120 : state.powerup === 'supersoaker' ? 180 : 350;
  if (keys.c && milkTimer <= 0) {
    milkTimer = fireRate;
    fireWeapon();
  }

  // ── Powerup timer
  if (state.powerup && state.powerupTimer > 0) {
    state.powerupTimer -= dt;
    if (state.powerupTimer <= 0) {
      state.powerup = null;
      updateHUD();
    }
  }

  // ── Combo decay
  state.comboTimer -= dt;
  if (state.comboTimer <= 0 && state.combo > 1) {
    state.combo = 1;
    updateHUD();
  }

  // ── Flash msg
  if (state.flashTimer > 0) state.flashTimer -= dt;

  // ── Invincibility frames
  if (state.invincible > 0) state.invincible -= dt;

  // ── Enemy spawn
  enemySpawnTimer -= dt;
  if (enemySpawnTimer <= 0) {
    spawnEnemy();
    enemySpawnTimer = Math.max(300 + (state.speed - 1.5) * 70, 1800 - state.score / 20);
  }

  // ── Drop spawn
  dropSpawnTimer -= dt;
  if (dropSpawnTimer <= 0) {
    if (Math.random() < 0.5) spawnDrop();
    dropSpawnTimer = 4000 + Math.random()*4000;
  }

  // ── Passive hazard spawn
  passiveTimer -= dt;
  if (passiveTimer <= 0) {
    if (Math.random() < 0.3) spawnPassive();
    passiveTimer = 5000 + Math.random()*8000;
  }

  // ── Update enemies
  enemies.forEach(e => {
    if (e.stunTimer > 0) { e.stunTimer -= dt; return; }
    const dx = cow.x - e.x, dy = cow.y - e.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    e.x += (dx/dist) * e.type.speed * sp * (dt/16);
    e.y += (dy/dist) * e.type.speed * sp * (dt/16);
    e.y += sp * 0.3 * (dt/16); // scroll with terrain

    // Ranged enemies shoot
    if (e.type.ranged) {
      e.fireTimer = (e.fireTimer||0) - dt;
      if (e.fireTimer <= 0) {
        e.fireTimer = 1500 + Math.random()*1000;
        projectiles.push({ x: e.x, y: e.y, vx: (dx/dist)*3, vy: (dy/dist)*3, r: 5, color: '#ff4444', enemy: true });
      }
    }

    // Scroll off screen
    if (e.y > canvas.height + 60) e.dead = true;

    // Hit cow
    if (!e.dead && state.invincible <= 0 && dist < 22 + (e.type.size/2)) {
      e.dead = true;
      if (state.chargeTimer > 0) {
        addScore(e.type.score);
        spawnParticle(e.x, e.y, e.type.color, 12);
        if (e.type.shape === 'human') healPlayer(0.25);
      } else {
        takeDamage(0.5);
      }
    }
  });

  // ── Update projectiles
  projectiles.forEach(p => {
    p.x += p.vx * (dt/16) * (p.enemy ? 1 : sp);
    p.y += p.vy * (dt/16) * (p.enemy ? 1 : sp*0.5) + (p.enemy ? 0 : sp * 0.5 * (dt/16));

    if (p.x < 0 || p.x > 400 || p.y < 0 || p.y > canvas.height) { p.dead = true; return; }

    if (!p.enemy) {
      enemies.forEach(e => {
        if (e.dead) return;
        const dx = p.x - e.x, dy = p.y - e.y;
        if (Math.sqrt(dx*dx+dy*dy) < e.type.size/2 + p.r) {
          e.hp--;
          spawnParticle(p.x, p.y, p.color, 5);
          p.dead = state.powerup !== 'supersoaker'; // supersoaker pierces
          if (e.hp <= 0) {
            e.dead = true;
            addScore(e.type.score);
            spawnParticle(e.x, e.y, e.type.color, 12);
            if (e.type.shape === 'human') healPlayer(0.25);
          }
        }
      });
    } else {
      const dx = p.x - cow.x, dy = p.y - cow.y;
      if (state.invincible <= 0 && Math.sqrt(dx*dx+dy*dy) < 18) {
        p.dead = true;
        takeDamage(0.25);
      }
    }
  });

  // ── Passive hazards
  passives.forEach(ph => {
    ph.y += sp * (dt/16);
    ph.timer -= dt;
    if (ph.timer <= 0 || ph.y > canvas.height + 60) { ph.dead = true; return; }
    const dx = ph.x - cow.x, dy = ph.y - cow.y;
    if (state.invincible <= 0 && Math.sqrt(dx*dx+dy*dy) < ph.type.size + 14) {
      ph.dead = true;
      takeDamage();
      showFlash(ph.type.label);
    }
  });

  // ── Drops
  drops.forEach(d => {
    d.y += sp * 0.8 * (dt/16);
    if (d.y > canvas.height + 40) { d.dead = true; return; }
    const dx = d.x - cow.x, dy = d.y - cow.y;
    if (Math.sqrt(dx*dx+dy*dy) < 20) {
      d.dead = true;
      state.powerup = d.ptype.id;
      state.powerupTimer = d.ptype.duration;
      showFlash(d.ptype.label);
      updateHUD();
    }
  });

  // ── Particles
  particles.forEach(p => {
    p.x += p.vx * (dt/16);
    p.y += p.vy * (dt/16);
    p.life -= dt;
    p.alpha = Math.max(0, p.life / p.maxLife);
    if (p.life <= 0) p.dead = true;
  });

  // ── Cull dead
  enemies    = enemies.filter(e => !e.dead);
  projectiles= projectiles.filter(p => !p.dead);
  drops      = drops.filter(d => !d.dead);
  particles  = particles.filter(p => !p.dead);
  passives   = passives.filter(p => !p.dead);

  // ── Score scroll bonus
  state.score += Math.floor(sp * dt / 800);
  updateHUD();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Terrain
  terrainTiles.forEach(t => {
    ctx.fillStyle = t.color;
    ctx.fillRect(t.x, t.y, t.size+1, t.size+1);
  });
  drawTerrainAccents();

  // Passives
  passives.forEach(ph => drawPassive(ph));

  // Drops
  drops.forEach(d => drawDrop(d));

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Projectiles
  projectiles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 8;
    ctx.shadowColor = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Enemies
  enemies.forEach(e => drawEnemy(e));

  // Cow
  drawCow();

  // Flash message
  if (state.flashTimer > 0) {
    const alpha = Math.min(1, state.flashTimer / 600);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffff66';
    ctx.font = 'bold 22px Boogaloo, cursive';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ff8800';
    ctx.fillText(state.flashMsg, canvas.width/2, 60);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Charge indicator
  if (state.chargeCooldown > 0) {
    const pct = 1 - state.chargeCooldown/2500;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(10, canvas.height-20, 60, 8);
    ctx.fillStyle = '#ffaa00';
    ctx.fillRect(10, canvas.height-20, 60*pct, 8);
  }
}

function drawTerrainAccents() {
  const T = TERRAINS[state.terrain];
  // small random accent details per terrain
  if (state.terrain === 'grass' || state.terrain === 'longgrass') {
    // drawn as part of terrain tiles already
  }
  if (state.terrain === 'moon' || state.terrain === 'mars') {
    // craters drawn below as part of tiles
  }
}

function drawCow() {
  const { x, y } = cow;
  const blink = state.invincible > 0 && Math.floor(state.invincible/80) % 2 === 0;
  if (blink) return;

  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 10, 18, 7, 0, 0, Math.PI*2);
  ctx.fill();

  // Body
  ctx.fillStyle = state.chargeTimer > 0 ? '#ffddaa' : '#fff';
  ctx.beginPath();
  ctx.ellipse(0, 0, 15, 11, 0, 0, Math.PI*2);
  ctx.fill();

  // Spots
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.ellipse(-4, -3, 5, 4, -0.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5, 3, 4, 3, 0.3, 0, Math.PI*2); ctx.fill();

  // Head
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(0, -13, 8, 7, 0, 0, Math.PI*2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-3, -14, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3, -14, 2, 0, Math.PI*2); ctx.fill();

  // Nostrils
  ctx.fillStyle = '#e0a0a0';
  ctx.beginPath(); ctx.arc(-2, -10, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(2, -10, 1.5, 0, Math.PI*2); ctx.fill();

  // Horns
  ctx.strokeStyle = '#d4a820';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-5,-18); ctx.lineTo(-7,-24); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5,-18); ctx.lineTo(7,-24); ctx.stroke();

  // Legs
  ctx.fillStyle = '#fff';
  [[-9,8],[-4,9],[4,9],[9,8]].forEach(([lx,ly]) => {
    ctx.fillRect(lx-2, ly, 4, 7);
  });

  // Udder
  ctx.fillStyle = '#f0a0a0';
  ctx.beginPath();
  ctx.ellipse(0, 9, 6, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // Powerup aura
  if (state.powerup) {
    const pu = POWERUP_TYPES.find(p=>p.id===state.powerup);
    ctx.strokeStyle = pu ? pu.color : '#fff';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.5 + 0.5*Math.sin(Date.now()/200);
    ctx.beginPath();
    ctx.ellipse(0, 0, 20, 16, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  const s = e.type.size;
  const c = e.type.color;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(0, s/2+2, s/2, s/4, 0, 0, Math.PI*2);
  ctx.fill();

  // HP bar
  if (e.type.hp > 1) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(-s/2, -s/2-8, s, 4);
    ctx.fillStyle = '#44ff44';
    ctx.fillRect(-s/2, -s/2-8, s*(e.hp/e.type.hp), 4);
  }

  switch(e.type.shape) {
    case 'human': drawHuman(c, s); break;
    case 'horse': drawHorse(c, s); break;
    case 'gator': drawGator(c, s); break;
    case 'wolf':  drawWolf(c, s); break;
    default:      drawHuman(c, s);
  }

  ctx.restore();
}

function drawHuman(c, s) {
  const h = s;
  ctx.fillStyle = c;
  ctx.beginPath(); ctx.arc(0, -h/2, h/4, 0, Math.PI*2); ctx.fill(); // head
  ctx.fillRect(-h/5, -h/3, h/2.5, h/2); // body
  ctx.fillRect(-h/3, -h/4, h/5, h/2.5); // arm L
  ctx.fillRect(h/7,  -h/4, h/5, h/2.5); // arm R
  ctx.fillRect(-h/5, h/6,  h/5, h/2.5); // leg L
  ctx.fillRect(h/14, h/6,  h/5, h/2.5); // leg R
}

function drawHorse(c, s) {
  ctx.fillStyle = c;
  ctx.beginPath(); ctx.ellipse(0, 0, s/2, s/3, 0, 0, Math.PI*2); ctx.fill(); // body
  ctx.beginPath(); ctx.ellipse(s/3, -s/4, s/4, s/5, 0.5, 0, Math.PI*2); ctx.fill(); // head
  ctx.fillStyle = '#ccc';
  ctx.beginPath(); ctx.ellipse(0,-s/2+4, 4, s/4, 0.1, 0, Math.PI*2); ctx.fill(); // mane
  // legs
  ctx.fillStyle = c;
  [[-s/3,s/4],[-s/6,s/4],[s/6,s/4],[s/3,s/4]].forEach(([lx,ly])=>{
    ctx.fillRect(lx-3, ly, 6, s/2.5);
  });
}

function drawGator(c, s) {
  ctx.fillStyle = c;
  ctx.beginPath(); ctx.ellipse(0, 0, s/2, s/4, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2a6a2a';
  ctx.beginPath();
  ctx.moveTo(-s/2, 0);
  ctx.lineTo(-s*0.8, -s/8);
  ctx.lineTo(-s/2, s/8);
  ctx.closePath();
  ctx.fill(); // tail
  ctx.fillStyle = '#dd3333';
  ctx.beginPath(); ctx.arc(s/2, 0, s/4, 0.3, Math.PI*2-0.3); ctx.fill(); // open mouth
  // dots
  ctx.fillStyle = '#1a5a1a';
  for(let i=-3;i<4;i++) { ctx.beginPath(); ctx.arc(i*5,0,2,0,Math.PI*2); ctx.fill(); }
}

function drawWolf(c, s) {
  ctx.fillStyle = c;
  ctx.beginPath(); ctx.ellipse(0, 0, s/2, s/3, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(s/3, -s/4, s/4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.moveTo(s/5,-s/2+2); ctx.lineTo(s/4,-s/2-6); ctx.lineTo(s/3,-s/2+2); ctx.fill(); // ear
  ctx.fillStyle = '#f66'; ctx.beginPath(); ctx.arc(s/3+4, -s/4, 3, 0, Math.PI*2); ctx.fill(); // eye
  ctx.strokeStyle='#555'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(-s/2,-s/5); ctx.quadraticCurveTo(-s*0.7,0,-s/2,s/5); ctx.stroke();
}

function drawPassive(ph) {
  const t = ph.type;
  const pulse = 0.7 + 0.3*Math.sin(Date.now()/200);
  ctx.globalAlpha = Math.min(1, ph.timer/500) * pulse;
  ctx.fillStyle = t.color;
  ctx.shadowBlur = 20;
  ctx.shadowColor = t.color;

  if (t.id === 'wildfire') {
    for (let i=0; i<3; i++) {
      ctx.beginPath();
      ctx.arc(ph.x + i*12-12, ph.y, t.size/2+Math.sin(Date.now()/100+i)*4, 0, Math.PI*2);
      ctx.fill();
    }
  } else if (t.id === 'lightning') {
    ctx.strokeStyle = t.color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(ph.x, ph.y-30);
    ctx.lineTo(ph.x+8, ph.y);
    ctx.lineTo(ph.x-4, ph.y+10);
    ctx.lineTo(ph.x+6, ph.y+30);
    ctx.stroke();
  } else if (t.id === 'ufo') {
    ctx.beginPath(); ctx.ellipse(ph.x, ph.y, t.size, t.size/2, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#33ffaa';
    ctx.beginPath(); ctx.ellipse(ph.x, ph.y-4, t.size/2, t.size/3, 0, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath();
    ctx.arc(ph.x, ph.y, t.size, 0, Math.PI*2);
    ctx.fill();
  }

  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

function drawDrop(d) {
  const pu = d.ptype;
  const pulse = 0.8 + 0.2*Math.sin(Date.now()/250);
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.scale(pulse, pulse);
  ctx.fillStyle = pu.color;
  ctx.shadowBlur = 12;
  ctx.shadowColor = pu.color;

  if (pu.shape === 'star') {
    drawStar(0, 0, 5, 12, 6);
  } else if (pu.shape === 'drop') {
    ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-5,0); ctx.lineTo(5,0); ctx.lineTo(0,-16); ctx.closePath(); ctx.fill();
  } else if (pu.shape === 'stick') {
    ctx.fillRect(-4,-14,8,24);
    ctx.fillRect(-8,-14,16,6);
  } else {
    ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
    ctx.fillRect(-2,-22,4,14);
    ctx.fillRect(-8,-22,16,6);
  }

  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.font = '7px Press Start 2P, monospace';
  ctx.textAlign = 'center';
  ctx.fillText(pu.label.split(' ')[0], 0, 24);
  ctx.restore();
}

function drawStar(cx, cy, pts, r1, r2) {
  ctx.beginPath();
  for (let i=0; i<pts*2; i++) {
    const r = i%2===0 ? r1 : r2;
    const a = (Math.PI/pts)*i - Math.PI/2;
    i===0 ? ctx.moveTo(cx+r*Math.cos(a), cy+r*Math.sin(a)) : ctx.lineTo(cx+r*Math.cos(a), cy+r*Math.sin(a));
  }
  ctx.closePath(); ctx.fill();
}

// ─── GAME ACTIONS ─────────────────────────────────────────────────────────────
function getShootDir() {
  let dx = 0, dy = 0;
  if (keys.up)    dy = -1;
  if (keys.down)  dy =  1;
  if (keys.left)  dx = -1;
  if (keys.right) dx =  1;
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
  if (dx === 0 && dy === 0) dy = -1; // default: shoot up
  return { dx, dy };
}

function fireWeapon() {
  playMilkShot();
  const pu  = state.powerup;
  const baseColor = pu === 'toxic' ? '#44ff44' : pu === 'butter' ? '#ffee44' : '#ddeeff';
  const r   = pu === 'supersoaker' ? 8 : pu === 'butter' ? 9 : 6;
  const pv  = 8 + (state.speed - 1.5) * 1.2;
  const { dx, dy } = getShootDir();
  const angle = Math.atan2(dy, dx);
  const sx = cow.x + dx * 18;
  const sy = cow.y + dy * 18;

  if (pu === 'spread') {
    for (let a = -30; a <= 30; a += 15) {
      const rad = angle + a * Math.PI / 180;
      projectiles.push({ x:sx, y:sy, vx:Math.cos(rad)*pv*0.75, vy:Math.sin(rad)*pv*0.75, r:5, color:'#aa66ff', enemy:false });
    }
  } else if (pu === 'machinegun') {
    const jitter = (Math.random() - 0.5) * 0.25;
    projectiles.push({ x:sx, y:sy, vx:Math.cos(angle+jitter)*pv, vy:Math.sin(angle+jitter)*pv, r:4, color:'#ffaa00', enemy:false });
  } else {
    projectiles.push({ x:sx, y:sy, vx:dx*pv, vy:dy*pv, r, color:baseColor, enemy:false });
  }
}

async function loadLeaderboard() {
  const listEl = document.getElementById('leaderboardList');
  if (!listEl) return;
  listEl.innerHTML = '<div style="text-align:center; color:#888;">LOADING TOP COWS...</div>';

  const scores = await getTopScores();

  const listEl2 = document.getElementById('leaderboardList');
  if (!listEl2) return;

  const medals = ['🥇','🥈','🥉'];
  let html = '';
  if (scores.length === 0) {
    html = '<div style="text-align:center;color:#666;">No scores yet — be the first!</div>';
  } else {
    scores.forEach((s, i) => {
      const isYou = submittedName && s.name === submittedName && s.score === state.score;
      const rank  = i < 3 ? medals[i] : `${i+1}.`;
      html += `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #3a2810;${isYou?'color:#ffe066;':''}">
                 <span>${rank} ${s.name}</span><span>${s.score}</span>
               </div>`;
    });
  }
  listEl2.innerHTML = html;
}

// Apply farm title screen on first load
showTitleScreen();
